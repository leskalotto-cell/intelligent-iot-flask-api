version: "3.9"

# Lokalt udviklingsmiljø – bygger image fra kildekode og eksponerer DB
services:
  api:
    build: .                  # Byg fra Dockerfile i stedet for at pulle image
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    volumes:
      - .:/app                # Hot-reload: kodeændringer slår igennem uden rebuild
    environment:
      FLASK_DEBUG: "true"

  db:
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"   # Eksponer DB så man kan kigge med DBeaver/MySQL Workbench
